<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="black-piece" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="white-piece" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ccc"/>
    </radialGradient>
    <linearGradient id="board-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b30"/>
      <stop offset="100%" stop-color="#145524"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Board -->
  <g transform="translate(175, 25)">
    <rect width="450" height="400" rx="12" fill="url(#board-bg)" filter="url(#shadow)"/>

    <!-- Grid lines -->
    <g stroke="#1a5c25" stroke-width="2">
      <line x1="56.25" y1="0" x2="56.25" y2="400"/>
      <line x1="112.5" y1="0" x2="112.5" y2="400"/>
      <line x1="168.75" y1="0" x2="168.75" y2="400"/>
      <line x1="225" y1="0" x2="225" y2="400"/>
      <line x1="281.25" y1="0" x2="281.25" y2="400"/>
      <line x1="337.5" y1="0" x2="337.5" y2="400"/>
      <line x1="393.75" y1="0" x2="393.75" y2="400"/>
      <line x1="0" y1="50" x2="450" y2="50"/>
      <line x1="0" y1="100" x2="450" y2="100"/>
      <line x1="0" y1="150" x2="450" y2="150"/>
      <line x1="0" y1="200" x2="450" y2="200"/>
      <line x1="0" y1="250" x2="450" y2="250"/>
      <line x1="0" y1="300" x2="450" y2="300"/>
      <line x1="0" y1="350" x2="450" y2="350"/>
    </g>

    <!-- Center dots -->
    <circle cx="112.5" cy="100" r="4" fill="#1a5c25"/>
    <circle cx="337.5" cy="100" r="4" fill="#1a5c25"/>
    <circle cx="112.5" cy="300" r="4" fill="#1a5c25"/>
    <circle cx="337.5" cy="300" r="4" fill="#1a5c25"/>

    <!-- Pieces - a mid-game position -->
    <!-- Row 2 -->
    <circle cx="196.875" cy="125" r="18" fill="url(#black-piece)"/>

    <!-- Row 3 -->
    <circle cx="140.625" cy="175" r="18" fill="url(#white-piece)"/>
    <circle cx="196.875" cy="175" r="18" fill="url(#black-piece)"/>
    <circle cx="253.125" cy="175" r="18" fill="url(#black-piece)"/>

    <!-- Row 4 (center) -->
    <circle cx="140.625" cy="225" r="18" fill="url(#white-piece)"/>
    <circle cx="196.875" cy="225" r="18" fill="url(#white-piece)"/>
    <circle cx="253.125" cy="225" r="18" fill="url(#black-piece)"/>
    <circle cx="309.375" cy="225" r="18" fill="url(#black-piece)"/>

    <!-- Row 5 -->
    <circle cx="196.875" cy="275" r="18" fill="url(#white-piece)"/>
    <circle cx="253.125" cy="275" r="18" fill="url(#white-piece)"/>
    <circle cx="309.375" cy="275" r="18" fill="url(#black-piece)"/>

    <!-- Row 6 -->
    <circle cx="253.125" cy="325" r="18" fill="url(#white-piece)"/>
  </g>
</svg>
